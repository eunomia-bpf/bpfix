  taxonomy_class: source_bug
  error_id: BPFIX-E005
  confidence: medium
  label_source: adjudicated
  root_cause_description: The TLS parser builds `ext_len` from two packet bytes, but after
    the byte-assembly and endianness conversion the lowered register no longer has a non-negative
    lower bound, so `data + ext_len` is rejected as packet-pointer arithmetic with an unbounded
    min value.
  root_cause_insn_idx: 20
  root_cause_line: volatile int ext_len = __bpf_htons(ext->len);
  localization_confidence: high
  fix_type: type_cast
  fix_direction: Store the extension length in a separately clamped unsigned variable and
    redo the `data + ext_len` bound check immediately before advancing the packet cursor.
